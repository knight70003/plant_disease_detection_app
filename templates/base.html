{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PlantDoc AI{% endblock %}</title>
  <meta name="description" content="PlantDoc AI - upload a leaf image and get disease detection insights." />
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  <link rel="stylesheet" href="{% static 'css/recommendations.css' %}" />

  <!-- Tailwind (CDN) - for premium UI styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d'
            }
          }
        }
      }
    }
  </script>
</head>

<body>
  <!-- Navbar (Premium / Responsive) -->
  <nav class="navbar" aria-label="Primary">
    <div class="nav-inner">
      <a class="brand" href="{% url 'home' %}" aria-label="PlantDoc AI Home">
        <span class="brand-mark" aria-hidden="true">🌿</span>
        <span class="brand-text">PlantDoc <span class="brand-ai">AI</span></span>
      </a>

      <button class="nav-toggle" id="navToggle" type="button" aria-label="Open menu" aria-controls="navMenu" aria-expanded="false">
        <span class="nav-toggle-lines" aria-hidden="true"></span>
      </button>

      <div class="nav-menu" id="navMenu">
        <a class="nav-link" href="{% url 'home' %}">Home</a>
        <a class="nav-link" href="{% url 'features' %}">Features</a>
        <a class="nav-link" href="{% url 'analytics' %}">Analytics</a>
        <a class="nav-link" href="{% url 'contact' %}">Contact</a>

        <a class="nav-cta" href="{% url 'analytics' %}">
          <span class="nav-cta-dot" aria-hidden="true"></span>
          View Analytics
        </a>
      </div>
    </div>
  </nav>

  <script>
    (function () {
      const toggle = document.getElementById('navToggle');
      const menu = document.getElementById('navMenu');
      if (!toggle || !menu) return;

      const setExpanded = (expanded) => {
        toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
      };

      toggle.addEventListener('click', () => {
        const isOpen = menu.classList.toggle('open');
        setExpanded(isOpen);
      });

      // Close menu on link click (mobile)
      menu.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
          menu.classList.remove('open');
          setExpanded(false);
        });
      });

      // Close on Escape
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          menu.classList.remove('open');
          setExpanded(false);
        }
      });
    })();
  </script>


  {% block content %}{% endblock %}

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-title">PlantDoc AI</div>
      <div class="footer-sub">AI-powered plant disease detection • Built for farmers</div>
    </div>
  </footer>
  <script>
document.addEventListener("contextmenu", event => event.preventDefault());
</script>
</body>
</html>
