{% extends 'base.html' %}

{% block content %}

<div class="auth-page">

    <div class="auth-box">

        <h1>🌿 PlantDoc AI</h1>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have account?
            <a href="{% url 'signup' %}">
                Signup
            </a>
        </p>

    </div>

</div>

{% endblock %}
